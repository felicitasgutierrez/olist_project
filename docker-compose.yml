# Black Friday Pipeline - Data Engineering Project
# Ejecutar: docker compose up -d
# Los alumnos pueden agregar DAGs en ./dags y, si trabajan con archivos,
# leerlos desde /opt/airflow/data dentro de los contenedores de Airflow.

services:
  # ========== POSTGRES - AIRFLOW METADATA ==========
  postgres-airflow:
    image: postgres:15-alpine
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blackfriday-network

  # ========== POSTGRES - SOURCE (Tiendas Físicas) ==========
  postgres-source:
    image: postgres:15-alpine
    container_name: postgres-source
    environment:
      POSTGRES_USER: stores
      POSTGRES_PASSWORD: stores123
      POSTGRES_DB: stores_sales
    volumes:
      - postgres_source_data:/var/lib/postgresql/data
      - ./init_source.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stores"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blackfriday-network

  # ========== POSTGRES - DATA WAREHOUSE ==========
  postgres-dwh:
    image: postgres:15-alpine
    container_name: postgres-dwh
    environment:
      POSTGRES_USER: dwh
      POSTGRES_PASSWORD: dwh123
      POSTGRES_DB: dwh
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
      - ./init_dwh.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dwh"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blackfriday-network

  # ========== API - VENTAS APP (Simulada) ==========
  api-sales:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api-sales
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - blackfriday-network

  # ========== AIRFLOW - SCHEDULER ==========
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    command: airflow scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__WEBSERVER__SECRET_KEY=black-friday-lab-secret-key
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=False
      - AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL=30
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW_CONN_POSTGRES_SOURCE=postgres://stores:stores123@postgres-source:5432/stores_sales
      - AIRFLOW_CONN_POSTGRES_DWH=postgres://dwh:dwh123@postgres-dwh:5432/dwh
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy
      postgres-source:
        condition: service_healthy
      postgres-dwh:
        condition: service_healthy
      api-sales:
        condition: service_healthy
    networks:
      - blackfriday-network

  # ========== AIRFLOW - WEBSERVER ==========
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    command: airflow webserver
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__WEBSERVER__SECRET_KEY=black-friday-lab-secret-key
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=False
      - AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL=30
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW_CONN_POSTGRES_SOURCE=postgres://stores:stores123@postgres-source:5432/stores_sales
      - AIRFLOW_CONN_POSTGRES_DWH=postgres://dwh:dwh123@postgres-dwh:5432/dwh
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-scheduler:
        condition: service_started
      postgres-airflow:
        condition: service_healthy
    networks:
      - blackfriday-network

  # ========== AIRFLOW - INIT DB (ejecuta migraciones y crea usuario) ==========
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__WEBSERVER__SECRET_KEY=black-friday-lab-secret-key
    depends_on:
      postgres-airflow:
        condition: service_healthy
    networks:
      - blackfriday-network

  # ========== METABASE ==========
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase123
      MB_DB_HOST: postgres-metabase
    depends_on:
      postgres-metabase:
        condition: service_healthy
    networks:
      - blackfriday-network

  # Metabase necesita su propia DB para metadata
  postgres-metabase:
    image: postgres:15-alpine
    container_name: postgres-metabase
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase123
      POSTGRES_DB: metabase
    volumes:
      - postgres_metabase_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blackfriday-network

  # Crea el primer usuario de Metabase vía API (solo si aún está en modo setup)
  metabase-setup:
    image: python:3.12-alpine
    container_name: metabase-setup
    restart: "no"
    volumes:
      - ./scripts/metabase_auto_setup.py:/app/setup.py:ro
    command: ["python", "/app/setup.py"]
    environment:
      METABASE_URL: http://metabase:3000
      METABASE_ADMIN_EMAIL: admin@blackfriday.local
      METABASE_ADMIN_PASSWORD: BlackFridayLab1
      METABASE_ADMIN_FIRST_NAME: Admin
      METABASE_ADMIN_LAST_NAME: Lab
      METABASE_SITE_NAME: Black Friday Lab
    depends_on:
      metabase:
        condition: service_started
    networks:
      - blackfriday-network

networks:
  blackfriday-network:
    driver: bridge

volumes:
  postgres_airflow_data:
  postgres_source_data:
  postgres_dwh_data:
  postgres_metabase_data:
